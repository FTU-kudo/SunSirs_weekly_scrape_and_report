name: 📊 SunSirs Weekly Scrape

on:
  schedule:
    # 20:00 Chủ Nhật giờ Việt Nam (UTC+7) = 13:00 UTC Chủ Nhật
    - cron: '0 13 * * 0'
  workflow_dispatch:  # Cho phép chạy thủ công từ GitHub UI

jobs:
  scrape-sunsirs:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # ← thêm 2 dòng này

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run SunSirs scraper
        run: python src/commodities/sunsirs_scraper.py
       
      - name: Commit data về repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "🤖 Auto update SunSirs $(date +%Y-%m-%d)"
          git push
